<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Geometry</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(#020111,#191621,#3b2f63);
color:white;
overflow:hidden;
}

/* STAR BACKGROUND */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:0.3}
50%{opacity:1}
100%{opacity:0.3}
}

/* APP CARD */

.app{
width:380px;
height:680px;
background:rgba(255,255,255,0.08);
border-radius:20px;
backdrop-filter:blur(12px);
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* HEADER */

.header{
text-align:center;
font-size:26px;
font-weight:bold;
padding:14px;
letter-spacing:2px;
}

/* CONTENT */

.content{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding:15px;
}

/* PAGE */

.page{
display:none;
width:100%;
text-align:center;
}

.active{
display:block;
}

/* CANVAS */

#preview{
width:260px;
height:200px;
margin:10px auto;
}

/* FORM */

.form{
width:260px;
display:grid;
gap:10px;
margin:auto;
}

/* INPUT */

select,input{
width:100%;
height:42px;
border:none;
border-radius:10px;
padding:8px;
font-size:14px;
}

/* BUTTON */

button{
height:44px;
border:none;
border-radius:10px;
background:#ff4081;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#ff2a6d;
}

/* RESULT */

#hasil{
margin-top:8px;
font-weight:bold;
font-size:16px;
}

#rumus{
font-size:13px;
opacity:0.8;
margin-top:4px;
}

/* HISTORY */

.history{
width:260px;
max-height:380px;
overflow:auto;
margin:auto;
text-align:left;
font-size:14px;
}

.history div{
padding:6px 0;
border-bottom:1px solid rgba(255,255,255,0.15);
}

/* NAV */

.bottom-nav{
display:flex;
justify-content:space-around;
padding:12px;
background:#111;
border-top:1px solid rgba(255,255,255,0.2);
}

.bottom-nav button{
background:none;
font-size:18px;
}

</style>

</head>

<body>

<script>

/* stars */

for(let i=0;i<90;i++){
let star=document.createElement("div")
star.className="star"
star.style.left=Math.random()*100+"%"
star.style.top=Math.random()*100+"%"
document.body.appendChild(star)
}

</script>

<div class="app">

<div class="header">Geometry</div>

<div class="content">

<!-- HOME -->

<div id="home" class="page active">

<canvas id="preview"></canvas>

<div class="form">

<select id="bangun" onchange="ubahInput();updateRumus();createShape()">
<option value="kubus">Kubus</option>
<option value="balok">Balok</option>
<option value="tabung">Tabung</option>
<option value="kerucut">Kerucut</option>
<option value="bola">Bola</option>
<option value="prisma">Prisma</option>
<option value="limas">Limas</option>
</select>

<select id="operasi" onchange="updateRumus()">
<option value="volume">Volume</option>
<option value="luas">Luas Permukaan</option>
</select>

<div id="inputArea">
<input type="number" id="s" placeholder="Sisi">
</div>

<button onclick="hitung()">Hitung</button>

</div>

<div id="hasil"></div>
<div id="rumus"></div>

</div>

<!-- HISTORY -->

<div id="historyPage" class="page">

<h3>History</h3>

<div id="list" class="history"></div>

<button onclick="hapusHistory()">Hapus History</button>

</div>

</div>

<div class="bottom-nav">
<button onclick="showPage('home')">🏠 Home</button>
<button onclick="showPage('historyPage')">📜 History</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/controls/OrbitControls.js"></script>

<script>

/* navigation */

function showPage(p){

document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"))

document.getElementById(p).classList.add("active")

}

/* three js */

let scene=new THREE.Scene()

let camera=new THREE.PerspectiveCamera(75,260/200,0.1,1000)

let renderer=new THREE.WebGLRenderer({canvas:preview,alpha:true})

renderer.setSize(260,200)

let light=new THREE.PointLight(0xffffff,1)

light.position.set(4,4,4)

scene.add(light)

camera.position.z=3

let controls=new THREE.OrbitControls(camera,renderer.domElement)

let mesh

function createShape(){

if(mesh)scene.remove(mesh)

let type=document.getElementById("bangun").value

let geo

if(type=="kubus") geo=new THREE.BoxGeometry()

if(type=="balok") geo=new THREE.BoxGeometry(1.2,0.7,0.5)

if(type=="tabung") geo=new THREE.CylinderGeometry(0.5,0.5,1,32)

if(type=="bola") geo=new THREE.SphereGeometry(0.6,32,32)

if(type=="kerucut") geo=new THREE.ConeGeometry(0.6,1,32)

if(type=="prisma") geo=new THREE.CylinderGeometry(0.6,0.6,1,3)

if(type=="limas") geo=new THREE.ConeGeometry(0.7,1,4)

let mat=new THREE.MeshStandardMaterial({color:0xff4081})

mesh=new THREE.Mesh(geo,mat)

scene.add(mesh)

}

function animate(){
requestAnimationFrame(animate)
renderer.render(scene,camera)
}

animate()

createShape()

/* input */

function ubahInput(){

let b=document.getElementById("bangun").value
let area=document.getElementById("inputArea")

if(b=="kubus"){
area.innerHTML='<input type="number" id="s" placeholder="Sisi">'
}

if(b=="balok"){
area.innerHTML='<input type="number" id="p" placeholder="Panjang"><input type="number" id="l" placeholder="Lebar"><input type="number" id="t" placeholder="Tinggi">'
}

if(b=="bola"){
area.innerHTML='<input type="number" id="r" placeholder="Radius">'
}

if(b=="tabung"){
area.innerHTML='<input type="number" id="r" placeholder="Radius"><input type="number" id="t" placeholder="Tinggi">'
}

if(b=="kerucut"){
area.innerHTML='<input type="number" id="r" placeholder="Radius"><input type="number" id="t" placeholder="Tinggi">'
}

if(b=="prisma"){
area.innerHTML='<input type="number" id="la" placeholder="Luas Alas"><input type="number" id="t" placeholder="Tinggi">'
}

if(b=="limas"){
area.innerHTML='<input type="number" id="la" placeholder="Luas Alas"><input type="number" id="t" placeholder="Tinggi">'
}

}

/* rumus */

function updateRumus(){

let bangun=document.getElementById("bangun").value
let operasi=document.getElementById("operasi").value
let r=""

if(bangun=="kubus") r=operasi=="volume"?"V = s³":"L = 6s²"
if(bangun=="balok") r=operasi=="volume"?"V = p × l × t":"L = 2(pl + pt + lt)"
if(bangun=="bola") r=operasi=="volume"?"V = 4/3 πr³":"L = 4πr²"
if(bangun=="tabung") r=operasi=="volume"?"V = πr²t":"L = 2πr(r+t)"
if(bangun=="kerucut") r=operasi=="volume"?"V = 1/3 πr²t":"L = πr(r+s)"
if(bangun=="prisma") r="V = luas alas × tinggi"
if(bangun=="limas") r="V = 1/3 × luas alas × tinggi"

document.getElementById("rumus").innerHTML=r

}

updateRumus()

/* history */

window.onload=function(){

let data=localStorage.getItem("geo_history")

if(data)document.getElementById("list").innerHTML=data

}

/* calculate */

function hitung(){

const pi=3.1416

let b=document.getElementById("bangun").value
let o=document.getElementById("operasi").value
let h=0

if(b=="kubus"){
let s=parseFloat(sisi())
h=o=="volume"?s*s*s:6*s*s
}

function sisi(){return document.getElementById("s").value}

if(b=="balok"){
let p=pv("p"),l=pv("l"),t=pv("t")
h=o=="volume"?p*l*t:2*(p*l+p*t+l*t)
}

if(b=="bola"){
let r=pv("r")
h=o=="volume"?(4/3)*pi*r*r*r:4*pi*r*r
}

if(b=="tabung"){
let r=pv("r"),t=pv("t")
h=o=="volume"?pi*r*r*t:2*pi*r*(r+t)
}

if(b=="kerucut"){
let r=pv("r"),t=pv("t")
let s=Math.sqrt(r*r+t*t)
h=o=="volume"?(1/3)*pi*r*r*t:pi*r*(r+s)
}

if(b=="prisma"){
let la=pv("la"),t=pv("t")
h=la*t
}

if(b=="limas"){
let la=pv("la"),t=pv("t")
h=(1/3)*la*t
}

document.getElementById("hasil").innerHTML="Hasil = "+h.toFixed(2)

let time=new Date().toLocaleTimeString()

list.innerHTML+="<div>"+time+" - "+b+" ("+o+") = "+h.toFixed(2)+"</div>"

localStorage.setItem("geo_history",list.innerHTML)

}

function pv(id){
return parseFloat(document.getElementById(id).value)
}

function hapusHistory(){
list.innerHTML=""
localStorage.removeItem("geo_history")
}

</script>

</body>
</html>
